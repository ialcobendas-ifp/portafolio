<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js01</title>
    <style></style>
    
</head>
<body>
    <script type="text/javascript" language="javascript">

        // declaració de variables
        var nom;
        var cognom;

        // valor a les variables

        nom="Shiro";
        cognom="Alcobendas";

        // sortida de les dades a la consola
        console.log(nom+" "+cognom);

        //sortida de dades (string)
        document.write("L'alumne es diu "+nom+" "+cognom+"</br>");
        

        // declarem i donem valor a la vegada
        var nom="John";
        var cognom="Nieve";

        document.write("L'alumne es diu "+nom+" "+cognom+"</br>");

        //treballem amb variables numèriques (integer)

        var preu=10;
        var iva=1;


        document.write("El preu del formatge és " +(preu + iva)+"€</br>") 

        var cost=preu+iva

        document.write("El preu del formatge és " +cost+"€</br>") 



    </script>
    
</body>
</html>
