<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS04</title>
    <style>
        body {
            font-size: 3rem;
            font-family: helvetica;
        }
    </style>
</head>
<body>
    <script type="text/javascript" language="javascript">
        
    var verd="verd";
    var vermell="vermell";


    var colorintroduit=prompt("escriu el color");

    if (colorintroduit == verd)
    {
        document.write("verd");
        document.body.style.background="green";
    }

    if (colorintroduit == vermell)
    {
        document.write("vermell");
        document.body.style.background="red";
    }
       

    

    </script>
    
</body>
</html>
